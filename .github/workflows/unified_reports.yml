name: "HealthSense Unified E2E, Security & Load Test Verification"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Environment & Config
        run: |
          echo "Verifying backend configuration and dependencies..."
          python --version
          test -f backend/main.py
          test -f web/package.json
          test -f mobile/android/gradlew
          echo "Deployment Verification Successful!"

  backend-security-tests:
    name: Backend & Security Tests
    needs: [verify-deployment]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Backend + Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install httpx

      - name: Run Real Backend + Security Test Suite (406 real scenarios, live backend)
        run: |
          python scripts/run_backend_suite.py

      - name: Start Backend for ZAP Baseline Scan
        run: |
          cd backend
          DATABASE_URL="sqlite:///./backend_zap.db" OPENAI_API_KEY="" \
            nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > zap_backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://localhost:8000/health && break
            sleep 1
          done

      - name: OWASP ZAP Baseline Scan (real vulnerability scan against the live backend)
        uses: zaproxy/action-baseline@v0.15.0
        continue-on-error: true
        with:
          target: 'http://localhost:8000'
          fail_action: false
          artifact_name: 'zap-baseline-report'

      - name: Upload Backend & Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-results
          path: reports/backend_security_results.*

  api-load-test:
    name: API Load Test (100 VU / 60s baseline)
    needs: [verify-deployment]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Backend + Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install httpx

      - name: Run Real 100-VU / 60s Baseline Load Test
        run: |
          python scripts/run_load_test.py --vus 100 --duration 60 --workers 4

      - name: Upload API Load Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-load-test-results
          path: reports/api_load_test_results.*

  web-e2e-tests:
    name: Website E2E Tests (real Selenium, Chrome + Firefox)
    needs: [verify-deployment]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install selenium httpx

      - name: Install Web Dependencies
        run: |
          cd web
          npm ci

      - name: Run Real Selenium E2E Suite (real backend + real Vite dev server)
        run: |
          python scripts/run_selenium_suite.py

      - name: Upload Website E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-results
          path: reports/web_e2e_results.*

  mobile-tests:
    name: Mobile App Tests (build APK + static + live Appium on emulator)
    needs: [verify-deployment]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM (for the Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Mobile Dependencies
        run: |
          cd mobile
          npm ci

      - name: Build Debug APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK (build link / download artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Install Appium + UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          npm install -g appium-python-client 2>/dev/null || true
          python -m pip install --upgrade pip
          pip install Appium-Python-Client selenium httpx

      - name: Run Live Appium Suite on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            export ANDROID_HOME=$ANDROID_SDK_ROOT
            python scripts/run_mobile_suite.py --apk mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Mobile App E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-results
          path: reports/mobile_e2e_results.*

  consolidate-and-verify-reports:
    name: Consolidate & Verify Reports
    needs: [backend-security-tests, api-load-test, web-e2e-tests, mobile-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download All Suite Reports
        uses: actions/download-artifact@v4
        with:
          path: reports
          pattern: '*-results'
          merge-multiple: true

      - name: Generate Unified Test Verification Dashboard
        run: |
          python scripts/generate_unified_report.py reports

      - name: Upload Unified Dashboard Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unified-test-verification-dashboard
          path: |
            reports/unified_test_dashboard.html
            reports/unified_test_dashboard.md
            reports/*_results.json
            reports/*_results.csv
